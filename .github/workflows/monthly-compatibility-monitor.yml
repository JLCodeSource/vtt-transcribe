name: Monthly Compatibility Monitor

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  compatibility-check:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Collect package versions
        id: versions
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          packages = [
              "passlib",
              "bcrypt",
              "pyannote-audio",
              "torch",
              "torchcodec",
          ]

          def latest_version(package: str) -> str:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{package}/json", timeout=20) as response:
                  data = json.load(response)
              return str(data["info"]["version"])

          versions = {package: latest_version(package) for package in packages}

          lines = [
              "## Monthly dependency compatibility check",
              "",
              "This automated reminder tracks known compatibility blocks:",
              "- `passlib` with `bcrypt>=5.0.0`",
              "- `pyannote.audio` stack with `torch>=2.10.0` / `torchcodec>=0.8.0`",
              "",
              "### Latest PyPI versions",
          ]

          for package, version in versions.items():
              lines.append(f"- `{package}`: `{version}`")

          lines.extend(
              [
                  "",
                  "### Re-evaluation checklist",
                  "- [ ] Check Passlib release notes/changelog for explicit bcrypt 5.x support.",
                  "- [ ] Check pyannote.audio release notes/docs for torch 2.10+ and torchcodec 0.8+ compatibility.",
                  "- [ ] If support is confirmed, open a branch that relaxes pins in `pyproject.toml` and run full CI.",
                  "",
                  "### Tracking references",
                  "- Closed PR: `#265` (`torch 2.8.0 -> 2.10.0`)",
                  "- Open PR: `#266` (`torchcodec 0.7.0 -> 0.10.0`)",
                  "- Open PR: `#295` (`bcrypt 4.3.0 -> 5.0.0`)",
              ]
          )

          issue_body = "\n".join(lines)
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
              f.write("issue_body<<EOF\n")
              f.write(issue_body)
              f.write("\nEOF\n")
          PY

      - name: Create or update monthly tracking issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: "Monthly compatibility check: Passlib/Bcrypt and Pyannote/Torch"
          ISSUE_BODY: ${{ steps.versions.outputs.issue_body }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = process.env.ISSUE_TITLE;
            const body = process.env.ISSUE_BODY;

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const issue = existing.find((item) => item.title === title && !item.pull_request);

            if (issue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
              core.info(`Added monthly update comment to issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.info(`Created monthly tracking issue #${created.data.number}`);
            }
