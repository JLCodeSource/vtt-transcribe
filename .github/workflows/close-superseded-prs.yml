name: Close Superseded PRs

on:
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: 'Comma-separated list of PR numbers to close as superseded'
        required: true
        default: '361,363,364,366,367,368,369,370,371,372'
      reason:
        description: 'Reason for closing'
        required: false
        default: 'Superseded: dependency update already applied directly to main'

permissions:
  pull-requests: write

jobs:
  close-superseded-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close superseded PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra PR_LIST <<< "${{ github.event.inputs.pr_numbers }}"
          for pr in "${PR_LIST[@]}"; do
            pr=$(echo "$pr" | tr -d ' ')
            echo "Closing PR #$pr..."
            gh pr close "$pr" \
              --repo "${{ github.repository }}" \
              --comment "${{ github.event.inputs.reason }}" \
              || echo "Failed to close PR #$pr (may already be closed)"
          done
